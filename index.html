<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | FLAMES OF REVIVAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Special styles just for this landing entryway */
        .landing-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            padding: 20px;
        }

        .landing-logo {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 800;
            letter-spacing: 5px;
            margin-bottom: 10px;
            animation: fadeInDown 1.5s ease;
        }

        .landing-sub {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1rem;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 0.5s;
        }

        .enter-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: 2px solid var(--accent);
            color: var(--accent);
            text-decoration: none;
            border-radius: 50px;
            transition: 0.4s;
            font-weight: 700;
            opacity: 0;
            animation: fadeIn 2s ease forwards 1s;
        }

        .enter-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.4);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="landing-wrapper">
        <h1 class="logo landing-logo">FLAMES OF REVIVAL</h1>
        <p class="landing-sub">Ministry | Worship | Word</p>
        
        <a href="home.html" class="enter-btn">ENTER WEBSITE</a>
    </div>

</body>
</html>
